upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ──────────────────────────────────────────────────────────────────
# HTTP block — ACME challenge + redirect everything else to HTTPS
# ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name db2.medoed.work;

    # Let's Encrypt webroot challenge (HTTP-01)
    # Certbot записывает сюда токен, мы отдаём напрямую без редиректа.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное → HTTPS (постоянный redirect)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────────
# HTTPS block — основной production trafficж
# ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name db2.medoed.work;

    ssl_certificate /etc/letsencrypt/live/db2.medoed.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db2.medoed.work/privkey.pem;

    # SSL hardening (Mozilla intermediate profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (на 6 месяцев — увеличить до года когда убедимся что всё ок)
    add_header Strict-Transport-Security "max-age=15768000" always;

    client_max_body_size 20M;

    # API endpoints
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Media files (uploaded images, exports)
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Swagger docs (dev/staging only — consider disabling in prod)
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Frontend (everything else)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
