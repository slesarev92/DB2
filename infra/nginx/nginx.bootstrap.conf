# Bootstrap nginx config — HTTP only, для получения первого SSL сертификата.
#
# Использование: временно подменить nginx.conf на этот файл, перезапустить
# nginx, запустить certbot. После получения сертификата вернуть полный
# nginx.conf со SSL блоком.
#
# Подробная инструкция: docs/SSL_SETUP.md

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name db2.medoed.work;

    client_max_body_size 20M;

    # Let's Encrypt webroot challenge — отдаём напрямую без редиректа.
    # Certbot записывает токен в /var/www/certbot/.well-known/acme-challenge/
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
