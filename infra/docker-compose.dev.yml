# Dev-окружение цифрового паспорта проекта.
#
# Поднять:    docker compose -f infra/docker-compose.dev.yml up --build
# Остановить: docker compose -f infra/docker-compose.dev.yml down
# Сбросить БД: docker compose -f infra/docker-compose.dev.yml down -v
#
# Порты:
#   postgres → 5432
#   redis    → 6379
#   backend  → 8000  (/health)
#   frontend → 3000

name: dbpassport-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpassword
      POSTGRES_DB: dbpassport
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d dbpassport"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      # Host 8001 → container 8000. Host 8000 occupied by OP_GANSTA dev backend.
      - "8001:8000"
    volumes:
      - ../backend:/app
      # Фаза 4.5.2: file storage backend для media (package images,
      # concept designs). Persistent volume — survives container restart.
      # Структура: /media/{project_id}/{kind}/{uuid}_{filename}
      - media-storage:/media
    # Phase 7.1: секреты (POLZA_AI_API_KEY и т.п.) читаются из
    # project-root .env. Пути в env_file относительны compose-файлу
    # (infra/), поэтому ../.env = DB2/.env. Переменные из env_file
    # перезатираются значениями в explicit `environment:` ниже —
    # порядок precedence docker-compose: environment > env_file.
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://dbuser:dbpassword@postgres:5432/dbpassport
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: dev-secret-change-in-prod-min-32-chars
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost:3000
      MEDIA_STORAGE_ROOT: /media
      # B-15: S3/MinIO settings. Если S3_ENDPOINT задан — media хранится
      # в S3. Если нет — fallback на filesystem (MEDIA_STORAGE_ROOT).
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: media
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend:/app
      # Тот же volume что у backend — celery task'и Phase 7.8 будут
      # сохранять AI-generated изображения.
      - media-storage:/media
    # Phase 7.1: celery-worker тоже нуждается в POLZA_AI_API_KEY для
    # будущих async AI-задач (7.8 image generation через Celery task).
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://dbuser:dbpassword@postgres:5432/dbpassport
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: dev-secret-change-in-prod-min-32-chars
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      MEDIA_STORAGE_ROOT: /media
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: media
      S3_REGION: us-east-1
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # F-05: watchmedo auto-restart — celery-worker перезапускается на
    # изменение *.py файлов. Celery у себя не имеет --reload (uvicorn
    # делает, celery нет). Без этого флага приходилось руками дёргать
    # `docker compose restart celery-worker` после правок в engine/,
    # calculation_service, sensitivity_service — иначе API возвращал
    # успех, но в БД сохранялись старые значения / новые поля = NULL.
    #
    # `--debug-force-polling --interval=2` обязательны на Windows+Docker
    # Desktop/WSL2: inotify events не прокидываются через bind mount —
    # без polling auto-restart молчит. На Linux polling не вредит (лёгкий
    # stat каждые 2 секунды). В prod (docker-compose.prod.yml) watchmedo
    # не используется вообще.
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive --debug-force-polling --interval=2 -- celery -A app.worker worker --loglevel=info

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NODE_ENV: development
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  # Фаза 4.5.2: file storage для MediaAsset (fallback если S3 не настроен).
  media-storage:
  # B-15: MinIO S3-compatible object storage.
  minio-data:
