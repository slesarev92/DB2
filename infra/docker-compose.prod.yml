# Production compose — GHCR images, nginx reverse proxy, no bind mounts.
#
# Usage:
#   1. Create .env on server with all required vars (see .env.example)
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d
#
# Images are built and pushed by GitHub Actions CI (.github/workflows/ci.yml).

name: dbpassport-prod

services:
  # ── Database ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dbpassport}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbuser} -d ${POSTGRES_DB:-dbpassport}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cache + Celery broker ──
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API ──
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/sashas/db2/backend:latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dbuser}:${POSTGRES_PASSWORD:-dbpassword}@postgres:5432/${POSTGRES_DB:-dbpassport}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
    volumes:
      - media-storage:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Celery worker ──
  celery-worker:
    image: ${BACKEND_IMAGE:-ghcr.io/sashas/db2/backend:latest}
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dbuser}:${POSTGRES_PASSWORD:-dbpassword}@postgres:5432/${POSTGRES_DB:-dbpassport}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
    volumes:
      - media-storage:/app/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/sashas/db2/frontend:latest}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Reverse proxy (HTTPS via Let's Encrypt) ──
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ── Certbot (Let's Encrypt cert renewal) ──
  # Запускается вручную для первого получения сертификата:
  #   docker compose -f docker-compose.prod.yml run --rm certbot \
  #       certonly --webroot -w /var/www/certbot \
  #       -d db2.medoed.work --email YOUR_EMAIL --agree-tos --no-eff-email
  # Для renew (раз в 60 дней): docker compose -f docker-compose.prod.yml \
  #       run --rm certbot renew && docker compose ... exec nginx nginx -s reload
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    profiles: ["tools"]   # Не запускается автоматически с up

volumes:
  postgres-data:
  redis-data:
  media-storage:
  letsencrypt:
  certbot-webroot:
