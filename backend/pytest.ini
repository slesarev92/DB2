[pytest]
asyncio_mode = auto
# Session-scoped engine fixtures требуют session-scoped event loop;
# иначе asyncpg выдаёт "Future attached to a different loop" при flush.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    acceptance: тяжёлые E2E acceptance тесты (Phase 6.1, ~60s). Запуск явно через `pytest -m acceptance`. Обычный pytest их исключает через `-m "not acceptance"` (см. CI config в 6.2).
    live: живые smoke-тесты с реальными внешними сервисами (Polza AI, Phase 7.1+). Требуют валидных credentials в .env. Никогда не запускаются в CI. Вручную: `pytest -m live`.
filterwarnings =
    ignore::DeprecationWarning:passlib
    ignore::DeprecationWarning:jose
# WeasyPrint тянет fontTools с очень шумным DEBUG/INFO логгингом при
# каждом рендере PDF (задача 5.3). Фильтруем на уровне pytest log
# capture — сам модуль логгер оставляем.
log_cli_level = WARNING
